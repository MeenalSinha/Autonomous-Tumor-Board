name: CI

on:
  push:
    branches: [ main, master, dev ]
  pull_request:
    branches: [ main, master, dev ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Verify project structure
      run: |
        echo "Checking project structure..."
        test -f requirements.txt
        test -d agents
        test -d models
        test -d orchestrator
        test -d utils
        test -f app.py
        test -f api.py
        echo "Project structure verified"
    
    - name: Check Python syntax
      run: |
        echo "Checking Python syntax..."
        python -m py_compile agents/__init__.py
        python -m py_compile agents/pathology_agent.py
        python -m py_compile agents/imaging_agent.py
        python -m py_compile agents/guideline_agent.py
        python -m py_compile agents/mdt_synthesizer.py
        python -m py_compile models/__init__.py
        python -m py_compile models/case_models.py
        python -m py_compile orchestrator/__init__.py
        python -m py_compile orchestrator/controller.py
        python -m py_compile utils/__init__.py
        python -m py_compile utils/report_generator.py
        python -m py_compile app.py
        python -m py_compile api.py
        echo "Python syntax check passed"
    
    - name: Verify documentation
      run: |
        echo "Checking documentation..."
        test -f README.md
        test -f LICENSE
        echo "Documentation verified"
    
    - name: Summary
      run: |
        echo "================================"
        echo "All CI checks passed"
        echo "================================"
        echo "- Project structure valid"
        echo "- Python syntax correct"
        echo "- Documentation present"
        echo "================================"
